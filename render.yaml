services:
  - type: web
    name: king-garant-bot
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: npm install -g pnpm@10.26.1 --prefer-offline && pnpm --filter @workspace/db run push && node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: king-garant-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false

databases:
  - name: king-garant-db
    region: frankfurt
    plan: free
